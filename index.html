<script>
    // === ARTÍCULO CORREGIDO: EXCLUSIVAMENTE ORMUZ, IRÁN Y EE.UU. ===
    // CORRECCIÓN ADICIONAL: Se eliminó la palabra "régimen" y se reemplazó por "gobierno" o "Estado".
    const ARTICULOS = [
        {
            id: 1,
            titulo: "Estrecho de Ormuz: la disuasión de Irán y el umbral de la guerra con EE.UU.",
            subtitulo: "Análisis táctico/estratégico, lógica de los falsos banderazos y el punto de fractura del orden imperial en Asia",
            fecha: "5 de marzo de 2026",
            autor: "Operador Analítico · M12e",
            heroImage: "https://ichef.bbci.co.uk/ace/ws/640/cpsprodpb/017e/live/b50b3a90-1823-11f1-bfea-7f34869b0bbb.jpg.webp",
            secciones: [
                {
                    id: "apertura",
                    meta: "FENOMENOLOGÍA DEL CONFLICTO",
                    titulo: "La imagen y su apariencia: los guardianes del flujo",
                    balazo: "Los buques de guerra no son defensores de la libertad, son los centinelas armados de la relación social capitalista en su punto más frágil.",
                    contenido: `
                        <p>La imagen que encabeza este análisis no es una ilustración inocente: es la representación visual de la reificación del poder. El Estrecho de Ormuz, punto geográfico estratégico, aparece dominado por la presencia de la fuerza militar (los buques de la Quinta Flota), ocultando las relaciones sociales y la lucha interimperialista que subyacen al flujo del petróleo. Nuestra intervención debe atravesar esta capa de pseudoconcreción.</p>
                        <p>La pregunta —quién gana la guerra en Ormuz, quién ejecuta falsos banderazos y por dónde estallará el cierre— no puede responderse con un parte de bajas naval. Exige desarticular la apariencia ideológica del conflicto y aplicar el instrumental teórico de la contradicción Capital-Vida, el Estado como condensación de fuerzas (Poulantzas) y la lógica dialéctica de ascenso de lo abstracto a lo concreto (Ilyenkov). Este análisis se centra exclusivamente en la dinámica entre Irán y EE.UU. y sus aliados, sin concesiones a la agenda mediática dominante.</p>
                    `
                },
                {
                    id: "rastreo",
                    meta: "BLOQUE 5 · TRIANGULACIÓN",
                    titulo: "Tres narrativas sobre Ormuz, una misma materia en disputa",
                    balazo: "La 'libertad de navegación' es el nombre que el capital global da a su necesidad de circulación ininterrumpida.",
                    contenido: `
                        <p><strong>Narrativa desde la centralidad (Pentágono/think tanks occidentales):</strong> Ormuz es el "estrangulamiento" de la economía global. Se presenta al gobierno de Irán como un actor irracional que "amenaza la libertad de navegación". La presencia de la Quinta Flota se justifica como "disuasión defensiva". Cualquier ataque a un petrolero se atribuye inmediatamente a Teherán para construir la narrativa de la "agresión iraní". El objetivo es mantener el statu quo de dominio naval y garantizar el flujo de petróleo a los aliados de EE.UU.</p>
                        <p><strong>Narrativa desde la periferia crítica (Sur global/geopolítica no alineada):</strong> Ormuz es el punto donde la soberanía nacional de Irán choca con el derecho del mar impuesto por el capital. La "libertad de navegación" es la libertad del capital de explotar los recursos de la región sin rendir cuentas a los Estados ribereños. La presencia naval de EE.UU. no es defensiva, sino ofensiva: es la punta de lanza del imperialismo para garantizar el flujo de petróleo a sus aliados y castigar a Irán con sanciones, manteniendo la subordinación de las petromonarquías.</p>
                        <p><strong>Narrativa desde Teherán (eje de la resistencia):</strong> Ormuz es una línea roja de la soberanía nacional. El cierre no es un objetivo, sino una capacidad de disuasión. Se presenta como un "dispositivo defensivo" ante una agresión existencial. La narrativa oficial iraní siempre enmarca cualquier incidente como una operación de "falsa bandera" de EE.UU. o Israel para provocar una guerra que justifique su presencia en la región y destruya su programa nuclear. La "unidad de los frentes" (Houthis, milicias en Irak) es la extensión de esta disuasión.</p>
                    `
                },
                {
                    id: "contradiccion",
                    meta: "P10 · DIAGNÓSTICO ESTRUCTURAL",
                    titulo: "La contradicción central en el Golfo Pérsico",
                    contenido: `
                        <p><strong>1. Contradicción Estructural Central:</strong> No es "Irán vs. EE.UU." como una mera rivalidad estatal. Es la contradicción entre la <strong>necesidad del capital global (estadounidense, europeo y asiático) de garantizar el flujo ininterrumpido de petróleo desde el Golfo Pérsico</strong> (base material de la acumulación) y el <strong>derecho de Irán a ejercer su soberanía sobre su territorio y aguas adyacentes</strong> para romper el cerco de sanciones y reconfigurar el equilibrio de poder regional. Es la contradicción entre la acumulación global y la soberanía nacional periférica.</p>
                        <p><strong>2. Contradicciones Subordinadas:</strong></p>
                        <ul>
                            <li><strong>Capital vs. Capital (contradicción interimperialista):</strong> La dependencia asiática (China, India, Japón) del petróleo del Golfo es mayor que la europea. Un cierre de Ormuz afectaría más a los aliados de EE.UU. en Asia que a EE.UU. mismo. Esto genera una fractura: ¿hasta qué punto EE.UU. está dispuesto a sacrificar la economía de sus aliados asiáticos para castigar a Irán?</li>
                            <li><strong>Vida vs. Capital a escala regional:</strong> La supervivencia del gobierno de Irán (vida política) vs. los intereses de las petromonarquías árabes que dependen de la protección estadounidense (capital).</li>
                        </ul>
                        <p><strong>3. Complejo de Mediaciones:</strong></p>
                        <ul>
                            <li><strong>El Estado (Poulantzas):</strong> EE.UU. actúa no solo como su propio Estado, sino como el "Estado del capital global" en la región, garantizando las condiciones generales de producción (el flujo de petróleo). El Estado iraní utiliza sus capacidades para proyectar poder a través de mediaciones: la Armada del Cuerpo de Guardianes de la Revolución (IRGC) y proxies regionales (Houthis en Yemen) para hostigar esa garantía.</li>
                            <li><strong>La Ideología (Pseudoconcreción):</strong> La "seguridad energética" y la "lucha contra el terrorismo" (con Irán en la lista del "eje del mal") son las capas ideológicas que ocultan la disputa material por la renta petrolera y la hegemonía regional.</li>
                            <li><strong>La Tecnología:</strong> La asimetría es total. Buques de guerra de última generación (EE.UU.) vs. minas navales de bajo costo, misiles antibuque de corto alcance y drones explosivos (Irán). La guerra asimétrica busca negar el dominio tecnológico superior mediante la saturación y el costo elevado.</li>
                        </ul>
                    `
                },
                {
                    id: "fuerzas",
                    meta: "CORRELACIÓN Y RUPTURA",
                    titulo: "Táctica, estrategia y la lógica de los falsos banderazos",
                    balazo: "Tácticamente EE.UU. puede hundir la marina iraní en horas. Estratégicamente Irán ya ganó: su amenaza es un factor estructural en la economía global.",
                    contenido: `
                        <p><strong>4. Correlación de Fuerzas:</strong></p>
                        <ul>
                            <li><strong>Tácticamente (corto plazo, en el estrecho):</strong> Gana EE.UU. Su capacidad de interdicción naval y destrucción de objetivos costeros es aplastante. Puede hundir la marina iraní en horas. Pero Irán no busca una batalla campal.</li>
                            <li><strong>Estratégicamente (largo plazo, disuasión y desgaste):</strong> Gana Irán. Ha conseguido que la simple amenaza de cierre de Ormuz sea un factor estructural en los precios del petróleo y en la planificación militar de EE.UU. Ha elevado el costo de una guerra contra él a un nivel prohibitivo. La capacidad de hostigar el tráfico (como hacen los Houthis en el Mar Rojo, extensión de esta lógica) sin llegar al cierre total mantiene la tensión y desgasta la economía global, erosionando la paciencia de los aliados de EE.UU.</li>
                        </ul>
                        <p><strong>5. Ruptura de la Pseudoconcreción (Análisis de los falsos banderazos en Ormuz):</strong></p>
                        <p>Aquí es donde el análisis debe ser más fino. La "falsa bandera" no es una conspiración ocasional, es una tentación estructural para un poder hegemónico en declive.</p>
                        <p><strong>¿Por qué EE.UU. o Israel atacarían a sus "propios aliados" en Ormuz?</strong> Porque necesitan un casus belli que unifique a la comunidad internacional (o al menos a sus aliados) contra Irán. Atacar un petrolero saudí o emiratí forzaría a Riad y Abu Dabi, que mantienen contactos con Teherán, a alinearse con EE.UU. en una respuesta militar. Rompe cualquier intento de distensión regional. Atacar un buque de guerra estadounidense y culpar a Irán sería el equivalente al Golfo de Tonkín: justificaría una respuesta masiva y directa contra Irán, algo que la administración estadounidense no puede vender fácilmente a su opinión pública sin una provocación clara.</p>
                        <p><strong>La lógica material:</strong> La "falsa bandera" es una operación de recomposición de la hegemonía fracturada. Cuando el aliado duda (petromonarquías negociando con Irán) y la opinión pública es reticente, la provocación se vuelve un instrumento de la razón de Estado para disciplinar a la propia coalición y generar el consenso interno para la guerra. No es una teoría loca, es una herramienta que está en la "caja de herramientas" del imperialismo, especialmente en su fase de declive.</p>
                    `
                },
                {
                    id: "umbral",
                    meta: "PRONÓSTICO DIALÉCTICO",
                    titulo: "¿Por dónde estallará el cierre de Ormuz? El error de cálculo israelí y el factor China",
                    balazo: "El cierre total es el último recurso de Irán, su 'opción nuclear' convencional. Solo lo activará ante una amenaza existencial.",
                    contenido: `
                        <p><strong>8. Umbral de Ruptura:</strong> La pregunta correcta no es "si estallará", sino "bajo qué forma y en qué contexto la disuasión fallará". El cierre total es el último recurso de Irán. Solo lo activará si percibe una amenaza existencial inminente: ataque a sus instalaciones nucleares, intento de cambio de gobierno por invasión, o un golpe directo a su liderazgo.</p>
                        <p><strong>Escenario A (Fractura en Europa):</strong> Si la guerra en Ucrania colapsa y Rusia obtiene una victoria decisiva, la atención de la OTAN se concentrará en su flanco este. Irán podría aprovechar para realizar acciones limitadas de hostigamiento en Ormuz, calculando que un Occidente sobrecargado no abrirá un segundo frente. Pero esto no provocaría un cierre total, sino una escalada controlada para probar los límites.</p>
                        <p><strong>Escenario B (Fractura en Asia - EL MÁS PROBABLE):</strong> El detonante vendrá de un error de cálculo de Israel. Israel percibe a Irán como una amenaza existencial y ha realizado sabotajes y asesinatos dentro de Irán. Si Israel lanza un ataque a gran escala contra las instalaciones nucleares iraníes (con o sin luz verde de EE.UU.), Teherán se verá ante la disyuntiva: responder con su palanca máxima.</p>
                        <p><strong>¿Por qué afectaría a EE.UU.?</strong> Porque un cierre de Ormuz dispararía el precio del petróleo a niveles estratosféricos (inflación global, recesión). Pero, más importante, obligaría a China a intervenir. China importa la mayor parte de su petróleo del Golfo. No puede permitir que su economía, ya frágil, sufra un bloqueo. Pekín tendría que desplegar su armada para escoltar sus propios buques o negociar directamente con Irán, dejando a EE.UU. como un actor irrelevante o, peor, como el causante del caos. La fractura sería geopolítica: el momento en que EE.UU. demuestra que ya no puede garantizar la "seguridad de las rutas" para sus propios aliados asiáticos, y China emerge como el verdadero garante de la estabilidad regional. Ese es el punto de no retorno para la hegemonía estadounidense.</p>
                    `
                },
                {
                    id: "cierre",
                    meta: "PRAXIS",
                    titulo: "Direccionalidad histórica y criterio ético-normativo",
                    contenido: `
                        <p><strong>9. Direccionalidad Histórica:</strong> La guerra en Ormuz (latente o activa) es un síntoma de la transición hacia un orden multipolar. La capacidad del Estado iraní de sostener la disuasión durante décadas, a pesar de las sanciones y las amenazas, demuestra que el poder unipolar tiene límites. La historia se mueve hacia la necesidad de negociar con los poderes regionales, no de imponerles condiciones. El estrecho es el laboratorio donde se prueba la nueva correlación de fuerzas global.</p>
                        <p><strong>10. Criterio Ético-Normativo (Cierre de Praxis):</strong> Frente a la inminencia de una catástrofe que disfrazan de "conflicto por la libertad de navegación", nuestra praxis analítica debe desmontar la farsa. El "nosotros" de clase no puede situarse ni del lado del imperio ni del lado del gobierno teocrático iraní. Debe situarse en la lucha por desarticular la lógica que convierte un punto geográfico en un campo de batalla por la acumulación. El análisis no es para saber quién ganará, sino para revelar que, en esta guerra, la humanidad (la vida de los marineros, la estabilidad económica de los pueblos, el medio ambiente del Golfo) es la variable de ajuste. La intervención es, por tanto, una advertencia: están jugando con fuego en un polvorín, y la chispa puede venir de quien menos lo esperamos, pero siempre en beneficio de la recomposición del capital.</p>
                        <div class="firma-analitica">[ R⊕10⊕T⊕P⊕A ] ∘ M ∘ B4 ∘ B7 — Protocolo de intervención dialéctica aplicado. Análisis corregido y densificado.</div>
                    `
                }
            ]
        }
    ];

    // === LÓGICA DE RENDERIZADO ===
    function cargarArticulo(index) {
        const art = ARTICULOS[index];
        const container = document.getElementById('contenido-principal');
        const menu = document.getElementById('menu-navegacion');
        
        // Actualizar Imagen Hero
        document.getElementById('hero-img').src = art.heroImage;
        
        // Limpiar y Generar Menú
        menu.innerHTML = "";
        art.secciones.forEach(sec => {
            const link = document.createElement('a');
            link.href = `#${sec.id}`;
            link.textContent = sec.meta.split('·')[0].trim() || sec.id.toUpperCase();
            menu.appendChild(link);
        });

        // Generar Contenido
        let html = `
            <div class="section-meta" style="margin-bottom:10px;">${art.fecha} · Por: ${art.autor}</div>
            <h1>${art.titulo}</h1>
            <p style="font-size: 20px; color: #444; margin-bottom: 40px;">${art.subtitulo}</p>
        `;

        art.secciones.forEach(sec => {
            html += `
                <section id="${sec.id}" class="seccion">
                    <div class="section-meta">${sec.meta}</div>
                    <h2>${sec.titulo}</h2>
                    ${sec.balazo ? `<div class="balazo-ep">${sec.balazo}</div>` : ''}
                    <div class="article-content">${sec.contenido}</div>
                </section>
            `;
        });

        // Añadir caja de comentarios genérica
        html += `
            <div class="comentarios">
                <h2>Comentarios</h2>
                <textarea placeholder="Escribe tu opinión..." rows="4" style="width:100%; padding:12px;"></textarea><br>
                <button disabled style="padding:10px 20px; background:#111; color:white; opacity:0.5; margin-top:10px;">Publicar (Demo)</button>
                <p style="font-size:14px; color:#777;">foro en modo lectura · intervenciones desactivadas</p>
            </div>
        `;

        container.innerHTML = html;
    }

    // Iniciar con el primer artículo
    window.onload = () => cargarArticulo(0);
</script>

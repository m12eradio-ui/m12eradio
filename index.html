<script>
    // === BASE DE DATOS - RADIO M12 ===
    // Análisis "El Imperio contra las cuerdas" con videos ACTUALIZADOS (Video1 nuevo, Video2 se queda)
    const ARTICULOS = [
        {
            id: 1,
            titulo: "El Imperio contra las cuerdas: la derrota estratégica de EE.UU. y la agonía de un orden",
            subtitulo: "Análisis dialéctico de la coyuntura 2026-2027 para trabajadores, estudiantes e intelectuales",
            fecha: "12 de marzo de 2026",
            autor: "Colectivo M12 · Operador analítico",
            autorCargo: "Dirección de Análisis",
            heroImage: "https://imagenes.elpais.com/resizer/v2/2TSCGE5J3BJUVICSQFNBQKUUNQ.jpg?auth=38108787ec29328ba74b3d5fbefbe44c5c743bc0efdc910bac6f2b1f3cfe87c7&width=1200",
            secciones: [
                {
                    id: "apertura",
                    meta: "INTRODUCCIÓN",
                    titulo: "La imagen que no es una postal",
                    balazo: "Los buques de guerra no son defensores de la libertad, son los centinelas armados de la relación social capitalista en su punto más frágil.",
                    contenido: `
                        <p>Miren la imagen que encabeza este análisis. No es una ilustración inocente, es la representación visual de la reificación del poder. El Estrecho de Ormuz, punto geográfico estratégico, aparece dominado por la presencia de la fuerza militar (los buques de la Quinta Flota), ocultando las relaciones sociales y la lucha interimperialista que subyacen al flujo del petróleo.</p>
                        <p>La narrativa oficial nos dice que Estados Unidos <em>perdió una guerra contra Irán</em>, que ya no controla Ormuz ni el Mar Rojo, que el precio del petróleo se dispara y que sufre una crisis interna. Pero esa es solo la corteza del fenómeno. La pregunta que debemos hacernos no es <strong>si EE.UU. está herido</strong>, sino <strong>qué revela esa herida</strong> sobre la naturaleza del capitalismo en su fase terminal y, sobre todo, <strong>hacia dónde nos arrastrará en los próximos tres meses</strong>. Nosotros, los trabajadores, estudiantes e intelectuales que sufrimos las consecuencias de sus crisis, necesitamos respuestas que atraviesen el ruido mediático y lleguen al hueso de la contradicción.</p>
                    `
                },
                {
                    id: "ruptura",
                    meta: "RUPTURA",
                    titulo: "La guerra que se perdió hace décadas",
                    balazo: "No poder usar Ormuz y el Mar Rojo no es un incidente táctico: es la constatación de que el garrote del imperialismo ya no llega.",
                    contenido: `
                        <p>Lo primero que debemos disolver es la apariencia de que EE.UU. "perdió" una guerra convencional. Esa es una trampa conceptual. La guerra no se perdió ayer en Ormuz; se viene perdiendo <em>estratégicamente</em> desde hace décadas, y el conflicto con Irán es solo la manifestación más reciente y aguda de esa derrota acumulativa.</p>
                        <p>Para entenderlo hay que ir a la base material: el poder de EE.UU. descansa, desde 1945, en dos pilares indisolubles: el control de las rutas marítimas globales (la "libertad de navegación" del capital) y el petróleo como sangre de la acumulación. Quien controla el flujo de petróleo, controla la economía mundial. Durante años, la Quinta Flota en Bahréin garantizaba ese control. Hoy, esa flota es un adorno caro e inútil.</p>
                        <p>Los Houthis en Yemen, con misiles de bajo costo, han cerrado el Mar Rojo a los intereses de Israel y sus aliados. Irán ha convertido Ormuz en una línea roja. La "guerra" que EE.UU. ha perdido no es una batalla de tanques, es la guerra por la <em>capacidad de imponer su voluntad sin costo</em>. Esa capacidad se ha evaporado. Y como toda estructura que pierde su función, comienza a pudrirse desde dentro. Lo que vemos ahora en Washington, en el Pentágono y en las calles de Estados Unidos no es un accidente, es la descomposición química de un imperio que ya no puede cumplir su misión histórica: garantizar la acumulación global del capital a cualquier precio.</p>
                    `
                },
                {
                    id: "nudo",
                    meta: "NUDO DIALÉCTICO",
                    titulo: "Contradicciones en ebullición",
                    balazo: "Analicemos las capas de esta crisis en los próximos 90 días, aplicando el método que nos obliga a ir de lo abstracto a lo concreto.",
                    contenido: `
                        <p><strong>1. La contradicción central: Capital global vs. Soberanía periférica.</strong> La subida del precio del petróleo no es un "shock" externo, es la nueva normalidad de un mundo donde el Sur global (Irán, Rusia, los BRICS) ha aprendido a usar sus recursos como armas geopolíticas. Para el capital estadounidense y europeo, esto es una asfixia lenta. Un petróleo caro significa inflación de costes, caída del consumo popular y presión sobre los márgenes de beneficio. Pero para las potencias emergentes (China, India), es un incentivo para acelerar la desdolarización y buscar rutas alternativas. En tres meses, veremos cómo la Reserva Federal se queda sin herramientas: si sube los tipos para contener la inflación, hunde la economía; si los baja, el dólar se devalúa y el petróleo se dispara más. Es la clásica pinza de la contradicción imperial.</p>
                        <p><strong>2. La fractura interimperialista.</strong> EE.UU. ya no es el único policía. China observa. Si el cierre de Ormuz se agudiza, Pekín no dudará en desplegar su flota para escoltar sus propios petroleros, mostrando a los aliados tradicionales de EE.UU. (Japón, Corea del Sur) quién garantiza realmente su supervivencia energética. La derrota de EE.UU. en Oriente Medio es, objetivamente, una victoria para la estrategia china de expansión sin confrontación directa. La fractura entre las clases dominantes estadounidenses no es ideológica (demócratas vs. republicanos), es material: una fracción del capital (la industrial, la del "America First") quiere replegarse y recomponer fuerzas; la otra (la financiera, la globalista) exige una respuesta militar desesperada para salvar lo que queda de su red de alianzas. Estas dos fracciones se desgarrarán en público en los próximos meses, paralizando aún más al Estado.</p>
                        <p><strong>3. La caída moral y la desobediencia: el ejército como espejo de la nación.</strong> Nos dijeron que los portaaviones son "símbolos de libertad". Son, en realidad, los centinelas armados de una relación social injusta en su punto más frágil. Cuando esos centinelas empiezan a dudar, el edificio tiembla. La "caída moral de las fuerzas armadas" y la "desobediencia al mando supremo" no son un problema de reclutas desmotivados. Son la consecuencia lógica de enviar a soldados, cada vez más provenientes de familias trabajadoras empobrecidas, a morir por un imperio que ya no puede prometerles ni una pensión digna. Es la contradicción capital-vida llevada al uniforme. El soldado estadounidense medio sabe que lucha por el flujo de petróleo que encarece la gasolina que él mismo no puede pagar. La desobediencia no es ideológica, es material: es la negación del cuerpo a sacrificarse por un sistema que le ha declarado la guerra a su propia existencia.</p>
                        <p><strong>4. La condensación en el Estado.</strong> El Estado norteamericano (Poulantzas) es el campo de batalla donde estas contradicciones se condensan. No es un sujeto con voluntad propia, es la <em>correlación de fuerzas</em> hecha institución. En los próximos tres meses, esa correlación estará en máximo desequilibrio. La Casa Blanca ordenará, el Pentágono pondrá pegas, el Congreso bloqueará los presupuestos, y los gobernadores (de ambos partidos) se pelearán por los recursos federales mientras las ciudades se hunden. Veremos un espectáculo dantesco de disfunción institucional, no por "mala política", sino porque el Estado ya no puede cumplir su función mínima: gestionar los intereses de una clase dominante profundamente dividida.</p>
                    `
                },
                {
                    id: "climax",
                    meta: "CLÍMAX",
                    titulo: "El polvorín y el error de cálculo",
                    balazo: "El umbral de ruptura no es una fecha en el calendario, es un punto de saturación. El polvorín puede estallar por el error de cálculo más tonto.",
                    contenido: `
                        <p>Imaginen: Israel, sintiendo que su único aliado se debilita, lanza un ataque desesperado contra instalaciones iraníes para forzar a EE.UU. a entrar. La respuesta de Irán no es una declaración de guerra, es el cierre efectivo de Ormuz. El precio del barril vuela a 150, 200 dólares. La inflación en EE.UU. no es un número, es el hambre en los supermercados. Y entonces, la "desobediencia" en las bases militares se convierte en motín cuando se ordena a los soldados embarcar hacia otra guerra sin sentido. La clase dominante se acusará mutuamente en los medios de "haber perdido Irán" y de "destruir la economía". No habrá un golpe de Estado tradicional, porque no hace falta: el Estado simplemente dejará de funcionar como mecanismo de cohesión.</p>
                    `

                {
                    id: "cierre",
                    meta: "PRAXIS",
                    titulo: "Organizarse para que la caída no nos aplaste",
                    balazo: "Frente a este escenario, el 'nosotros' de la clase trabajadora y los pueblos oprimidos no puede permitirse la contemplación.",
                    contenido: `
                        <p>No se trata de alegrarse por la agonía del imperio, porque su agonía no será silenciosa. Un imperio herido es más peligroso que un imperio fuerte. En los próximos tres meses, la direccionalidad histórica apunta hacia una profundización del caos que el capital intentará gestionar con más autoritarismo, más recortes sociales y más guerras por delegación. Nuestra tarea no es esperar a que caiga el imperio, sino organizarnos para que su caída no nos aplaste.</p>
                        <p>Esto significa fortalecer los lazos de solidaridad en nuestros barrios, en nuestras fábricas y en nuestras universidades. Significa negarse a ser la carne de cañón de una guerra que no es nuestra. Significa entender que, como dijo Rosa Luxemburgo, lo que se juega es socialismo o barbarie. La crisis de Estados Unidos nos demuestra que la barbarie ya está aquí, en forma de inflación, militarismo y descomposición social. La única respuesta digna es construir, desde ya, las trincheras de la nueva civilización.</p>
                        <p style="margin-top:2em;"><em>“Los buques de guerra no son defensores de la libertad, son los centinelas armados de la relación social capitalista en su punto más frágil.”</em></p>
                    `
                }
            ],

                    <div class="video-card">
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${video.youtubeId}" 
                                    title="${video.titulo}" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>
                        </div>
                        <div class="video-info">
                            <h4>${video.titulo}</h4>
                            <p>${video.descripcion}</p>
                            <span class="video-duracion">⏱️ ${video.duracion}</span>
                        </div>
                    </div>
                `;
            });
            
            html += `</div></div>`;
        }

        // ========== ESPACIO DE COMENTARIOS ==========
        html += `
            <div id="comentarios" class="comentarios" style="scroll-margin-top: 140px;">
                <div class="espacio-divider">
                    <span class="espacio-tag">PARTICIPACIÓN CIUDADANA</span>
                </div>
                <h2>Comparte tu opinión con la Dirección</h2>
                <p style="color: #555; margin-bottom: 30px;">Tus comentarios son importantes para la planeación de contenido de Radio M12</p>
                <textarea placeholder="Escribe tu opinión..." rows="5"></textarea><br>
                <button disabled>Publicar comentario (Demo)</button>
                <p style="font-size: 12px; color: #999; margin-top: 20px;">* Esta es una versión demo. Los comentarios se habilitarán próximamente.</p>
            </div>
        `;

        container.innerHTML = html;

        // Activar el enlace correcto en el menú según la sección visible
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    document.querySelectorAll('nav a').forEach(link => {
                        link.classList.remove('activo');
                        if (link.getAttribute('href') === '#' + entry.target.id) {
                            link.classList.add('activo');
                        }
                    });
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('#articulo, #videos, #comentarios').forEach(section => {
            observer.observe(section);
        });
    }

    // Iniciar
    window.onload = () => cargarArticulo(0);
</script>

</body>
</html>
